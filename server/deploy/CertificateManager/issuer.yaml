apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: server-letsencrypt
  namespace: wpsec
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: support@equalitie.org
    privateKeySecretRef:
      name: server-private-key
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx